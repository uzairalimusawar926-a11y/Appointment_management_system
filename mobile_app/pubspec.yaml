name: appointment_booking_app
description: A Flutter appointment booking app integrated with Odoo 18

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Date/Time
  intl: ^0.18.1
  table_calendar: ^3.0.9
  
  # UI Utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # Form Validation
  email_validator: ^2.1.17
  
  # Image Handling
  image_picker: ^1.0.7
  
  # Loading Indicators
  flutter_spinkit: ^5.2.0
  
  # Toast/Snackbar
  fluttertoast: ^8.2.4
  
  # URL Launcher
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
